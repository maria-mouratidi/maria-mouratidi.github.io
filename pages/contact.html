<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <link rel="stylesheet" href="../css/main.css">
  <link href="../assets/fonts/pixel-font.ttf" rel="stylesheet">
</head>
<body>
  <header>
    <h1 class="pixel-title">Contact Me</h1>
    <nav>
      <a href="../index.html">Home</a> |
      <a href="projects.html">Projects</a> |
      <a href="about.html">About</a> |
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section>
      <h2>Get in Touch</h2>
      <p>If you have any questions or would like to collaborate, feel free to reach out!</p>
      <form action="#" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        
        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>
        
        <button type="submit">Send Message</button>
      </form>
    </section>

    <section>
      <h2>Connect with Me</h2>
      <ul class="social-links">
        <li><a href="https://github.com/yourusername" target="_blank"><img src="../assets/images/icons/github.svg" alt="GitHub"></a></li>
        <li><a href="https://linkedin.com/in/yourusername" target="_blank"><img src="../assets/images/icons/linkedin.svg" alt="LinkedIn"></a></li>
        <li><a href="mailto:your@email.com"><img src="../assets/images/icons/email.svg" alt="Email"></a></li>
      </ul>
    </section>
  </main>

  <footer>
    <p>&copy; 2023 Maria Mouratidi. All rights reserved.</p>
  </footer>
</body>
</html>
